version: "3.9"

services:

  # -------------------------
  # API SERVICES (NO BUILD)
  # -------------------------

  pos-service:
    image: node:20
    working_dir: /app
    ports:
      - "4005:4005"
    env_file: ./services/pos-service/.env
    volumes:
      - ./services/pos-service:/app
    command: npm run start
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  hr-service:
    image: node:20
    working_dir: /app
    ports:
      - "4003:4003"
    env_file: ./services/hr-service/.env
    volumes:
      - ./services/hr-service:/app
    command: npm run start
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  inventory-service:
    image: node:20
    working_dir: /app
    ports:
      - "4004:4004"
    env_file: ./services/inventory-service/.env
    volumes:
      - ./services/inventory-service:/app
    command: npm run start
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  procurement-service:
    image: node:20
    working_dir: /app
    ports:
      - "4006:4006"
    env_file: ./services/procurement-service/.env
    volumes:
      - ./services/procurement-service:/app
    command: npm run start
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  admin-service:
    image: node:20
    working_dir: /app
    ports:
      - "4001:4001"
    env_file: ./services/admin-service/.env
    volumes:
      - ./services/admin-service:/app
    command: npm run start
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  analytics-service:
    image: node:20
    working_dir: /app
    ports:
      - "4002:4002"
    env_file: ./services/analytics-service/.env
    volumes:
      - ./services/analytics-service:/app
    command: npm run start
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net


  # -------------------------
  # DATABASE
  # -------------------------

  postgres:
    image: postgres:15
    container_name: retail-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - retail-net


  # -------------------------
  # REDIS
  # -------------------------

  redis:
    image: redis:7
    container_name: retail-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - retail-net


  # -------------------------
  # NGINX
  # -------------------------

  nginx:
    image: nginx:latest
    container_name: retail-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - pos-service
      - hr-service
    networks:
      - retail-net


  # -------------------------
  # PROMETHEUS
  # -------------------------

  prometheus:
    image: prom/prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - retail-net


  # -------------------------
  # GRAFANA
  # -------------------------

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - retail-net


# -------------------------
# VOLUMES
# -------------------------

volumes:
  postgres_data:
  redis_data:
  grafana_data:


# -------------------------
# NETWORK
# -------------------------

networks:
  retail-net:
    driver: bridge