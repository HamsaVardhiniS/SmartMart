version: "3.9"

services:

  # -------------------------
  # API SERVICES
  # -------------------------
  pos-service:
    build: ./services/pos-service
    ports:
      - "4005:4005"
    env_file: ./services/pos-service/.env
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  hr-service:
    build: ./services/hr-service
    ports:
      - "4003:4003"
    env_file: ./services/hr-service/.env
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  inventory-service:
    build: ./services/inventory-service
    ports:
      - "4004:4004"
    env_file: ./services/inventory-service/.env
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  procurement-service:
    build: ./services/procurement-service
    ports:
      - "4006:4006"
    env_file: ./services/procurement-service/.env
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  admin-service:
    build: ./services/admin-service
    ports:
      - "4001:4001"
    env_file: ./services/admin-service/.env
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  analytics-service:
    build: ./services/analytics-service
    ports:
      - "4002:4002"
    env_file: ./services/analytics-service/.env
    depends_on:
      - redis
      - postgres
    networks:
      - retail-net

  # -------------------------
  # DATABASE (FIXED)
  # -------------------------
  postgres:
    image: postgres:15
    container_name: retail-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # ✅ PERSISTENT DATA (CRITICAL FIX)
      - postgres_data:/var/lib/postgresql/data
      
      # ✅ INIT SCRIPTS (RUN ONLY FIRST TIME)
      - ./infrastructure/sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - retail-net

  # -------------------------
  # REDIS (FIXED)
  # -------------------------
  redis:
    image: redis:7
    container_name: retail-redis
    ports:
      - "6379:6379"
    volumes:
      # ✅ persist redis (optional but recommended)
      - redis_data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    networks:
      - retail-net

  # -------------------------
  # NGINX
  # -------------------------
  nginx:
    image: nginx:latest
    container_name: retail-nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - pos-service
      - hr-service
    networks:
      - retail-net

  # -------------------------
  # PROMETHEUS
  # -------------------------
  prometheus:
    image: prom/prometheus
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - retail-net

  # -------------------------
  # GRAFANA
  # -------------------------
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - retail-net


# -------------------------
# VOLUMES (CRITICAL)
# -------------------------
volumes:
  postgres_data:
  redis_data:
  grafana_data:

# -------------------------
# NETWORK
# -------------------------
networks:
  retail-net:
    driver: bridge